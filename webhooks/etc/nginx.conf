# webhooks — path-routed service location FRAGMENT (NOT a vhost).
#
# Per docs/path-routing-architecture.md the dashboard owns the apex server block,
# the single TLS cert, and the /_authn introspection hook. A service owns nothing
# global: `opsctl setup webhooks` symlinks /etc/nginx/conf.d/locations/webhooks.conf ->
# /opt/webhooks/etc/current/nginx.conf, which the dashboard's apex server block
# includes. No server{}, no cert, no listen.
#
# MOUNT and the loopback PORT are both literal here (MOUNT=/srv/webhooks/, port 3006).
# Per D01/D04 this fragment is authored and shipped VERBATIM, then symlinked live
# by setup — nothing substitutes it, so it must be directly loadable by nginx.
#
# webhooks serves FOUR kinds of route under its mount:
#   - the unauthenticated RFC 9728 PRM doc (bootstrap, no token),
#   - the bearer-authenticated MCP endpoint (north/south, via /_authn),
#   - the PUBLIC inbound ingress tier POST /srv/webhooks/in/<name> — reached
#     directly by third parties with NO front-door auth chain; it self-guards on
#     a per-webhook secret, so it gets NO auth_request and NO identity headers,
#   - everything else under the mount is shielded (404). Unlike crm the whole
#     mount is NOT gated — only /mcp is; the catch-all below 404s the rest, which
#     also keeps the internal /feed off the public mount.

# Unauthenticated PRM bootstrap — NO auth_request. An MCP client with no token
# yet must be able to fetch this RFC 9728 doc to discover the AS. The exact-match
# `=` location wins over the `/srv/webhooks/` catch-all below regardless of order,
# so this one path stays open while the MCP endpoint is gated.
location = /srv/webhooks/.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:3006/.well-known/oauth-protected-resource;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Authenticated MCP endpoint. EXACT-match (`=`) so neither the public ingress
# prefix nor the catch-all can shadow it. Goes through auth_request to the
# dashboard's bearer introspection hook.
location = /srv/webhooks/mcp {
    auth_request /_authn;
    auth_request_set $webhooks_owner  $upstream_http_x_owner_email;
    auth_request_set $webhooks_client $upstream_http_x_client_id;

    # Rate limiting: the introspection endpoint returns 429 when a token is over
    # budget, but auth_request only understands 2xx (allow) and 401/403 (deny) —
    # every other subrequest status, 429 included, is collapsed into a synthetic
    # 500. Capture the real subrequest status (and its Retry-After) and intercept
    # that 500 below to re-emit a faithful 429. error_page only catches
    # nginx-internal 500s (proxy_intercept_errors is off), so a genuine 500 from
    # the webhooks upstream still passes through untouched.
    auth_request_set $authn_status $upstream_status;
    auth_request_set $authn_retry  $upstream_http_retry_after;
    error_page 500 = @webhooks_authn_500;

    # Identity hygiene: `proxy_set_header X-Owner-Email $webhooks_owner;` REPLACES
    # the client's inbound X-Owner-Email entirely on the upstream request. nginx
    # does NOT pass inbound client headers as proxy headers unless explicitly set,
    # and the last proxy_set_header for a name wins. So a single set from the auth
    # subrequest variable is sufficient and safe — a client cannot smuggle
    # identity through.
    proxy_set_header X-Owner-Email $webhooks_owner;
    proxy_set_header X-Client-Id  $webhooks_client;

    proxy_pass http://127.0.0.1:3006/mcp;   # exact path; upstream serves /mcp
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Event plane is internal-only (event-protocol.md §2): the SSE feed is
# loopback-only and UNAUTHENTICATED, and must NEVER be reachable through nginx.
# This exact-match `=` location wins over the `/srv/webhooks/` catch-all below,
# so the public mount returns 404 for /feed. Direct loopback consumers connect to
# 127.0.0.1:3006/feed.
location = /srv/webhooks/feed { return 404; }

# Session-gated landing surface. EXACT-match (`=`) so the catch-all prefix below
# still shields every non-listed path under the mount.
location = /srv/webhooks/ {
    auth_request /_session-authn;
    error_page 401 = @login_bounce;
    auth_request_set $webhooks_session_owner $upstream_http_x_owner_email;
    proxy_set_header X-Owner-Email $webhooks_session_owner;

    proxy_pass http://127.0.0.1:3006/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Session-gated static assets for the landing surface. The trailing-slash
# proxy_pass strips the /srv/webhooks/ mount and maps to upstream /static/.
location /srv/webhooks/static/ {
    auth_request /_session-authn;
    error_page 401 = @login_bounce;
    proxy_pass http://127.0.0.1:3006/static/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# PUBLIC inbound ingress — NO auth_request, NO identity headers. Third parties
# POST here with the per-webhook bearer secret; the webhooks process self-guards
# on that secret and returns a byte-identical 404 for every auth failure. Because
# nginx injects no X-Owner-Email/X-Client-Id here, the ingress handler (which
# rejects any request carrying those internal headers) sees a clean public
# request. The trailing-slash proxy_pass strips the /srv/webhooks/ mount, mapping
# /srv/webhooks/in/<name> -> /in/<name> on the upstream. Inbound payloads are
# capped at 2m (the upstream additionally enforces its own 1 MiB body cap).
location /srv/webhooks/in/ {
    client_max_body_size 2m;
    proxy_pass http://127.0.0.1:3006/in/;   # trailing slash strips the mount
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Catch-all — every other path under the mount is shielded. webhooks exposes only
# the PRM doc, the gated /mcp endpoint, and the public /in/ ingress above; nothing
# else (including any stray /feed-adjacent path) is reachable through the front door.
location /srv/webhooks/ { return 404; }

# Reached only when auth_request collapsed a non-allow/deny subrequest status to
# 500. If the introspection endpoint actually said 429 (rate limited), surface
# that faithfully with its Retry-After; otherwise it was a real internal error.
location @webhooks_authn_500 {
    if ($authn_status = 429) {
        add_header Retry-After $authn_retry always;
        return 429;
    }
    return 500;
}
