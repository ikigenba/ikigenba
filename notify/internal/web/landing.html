<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Service}} - notify</title>
  <link rel="stylesheet" href="{{.AssetPath}}">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
    }
    main {
      display: grid;
      min-height: 100vh;
      place-items: center;
      width: min(var(--layout-max-width), calc(100% - var(--space-12)));
      margin: 0 auto;
      padding: var(--space-16) 0;
    }
    .landing-card {
      width: min(100%, 640px);
      padding: var(--space-12);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius);
    }
    .eyebrow {
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      line-height: var(--text-label-lh);
      letter-spacing: 0;
      text-transform: uppercase;
    }
    h1 {
      margin: var(--space-4) 0 var(--space-6);
      font-family: var(--font-display);
      font-size: var(--text-display-size);
      font-weight: var(--text-display-weight);
      line-height: var(--text-display-lh);
      letter-spacing: 0;
    }
    p {
      max-width: 620px;
      color: var(--color-text-muted);
      font-size: var(--text-body-lg-size);
      font-weight: var(--text-body-lg-weight);
      line-height: var(--text-body-lg-lh);
    }
    dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: var(--space-2) var(--space-4);
      margin-top: var(--space-12);
      padding-top: var(--space-6);
      border-top: var(--border-width) solid var(--color-border);
      font-family: var(--font-mono);
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      line-height: var(--text-label-lh);
    }
    dt {
      color: var(--color-text-muted);
    }
    dd {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <section class="landing-card" aria-label="Service status">
      <div class="eyebrow">Notification service</div>
      <h1>{{.Service}}</h1>
      <p>Push notifications for suite events are active through this service endpoint.</p>
      <dl>
        <dt>Service</dt>
        <dd>{{.Service}}</dd>
        <dt>Version</dt>
        <dd>{{.Version}}</dd>
      </dl>
    </section>
  </main>
</body>
</html>
