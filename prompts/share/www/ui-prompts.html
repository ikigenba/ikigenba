<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompts · {{.Service}}</title>
  <link rel="preload" as="font" type="font/woff2" crossorigin href="/srv/prompts/static/fonts/space-grotesk.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="/srv/prompts/static/fonts/ibm-plex-sans.woff2">
  <link rel="stylesheet" href="/srv/prompts/static/tokens.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--color-text); background: var(--color-bg); font-family: var(--font-body); }
    main { width: min(100% - 32px, 1200px); margin: 0 auto; padding: var(--space-8) 0 var(--space-16); }
    a { color: inherit; }
    .home, .version, label, th, .pager { font-family: var(--font-mono); font-size: var(--text-label-size); line-height: var(--text-label-lh); }
    .home { color: var(--color-text-muted); text-decoration: none; text-transform: uppercase; }
    header { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-4); margin-top: var(--space-10); }
    h1 { margin: 0; font-family: var(--font-display); font-size: var(--text-heading-01-size); line-height: var(--text-heading-01-lh); }
    .version { color: var(--color-text-muted); }
    nav { display: flex; gap: var(--space-8); margin-top: var(--space-8); border-bottom: var(--border-width) solid var(--color-border); }
    nav a { padding: var(--space-3) 0; color: var(--color-text-muted); text-decoration: none; }
    nav a.active { color: var(--color-text); border-bottom: 2px solid currentColor; }
    form { display: flex; gap: var(--space-3); margin: var(--space-8) 0 var(--space-6); }
    input, button { min-height: 40px; border: var(--border-width) solid var(--color-border); background: var(--color-bg); color: var(--color-text); font: inherit; padding: var(--space-2) var(--space-3); }
    input { flex: 1; }
    button { cursor: pointer; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: var(--space-3); border-bottom: var(--border-width) solid var(--color-border); text-align: left; vertical-align: top; }
    th { color: var(--color-text-muted); text-transform: uppercase; }
    td:first-child { font-weight: 600; }
    .pager { display: flex; justify-content: space-between; align-items: center; gap: var(--space-4); margin-top: var(--space-6); }
    .pager-links { display: flex; gap: var(--space-4); }
    @media (max-width: 640px) { header { align-items: flex-start; flex-direction: column; } form { flex-direction: column; } }
  </style>
</head>
<body>
  <main>
    <a class="home" href="/">Home</a>
    <header>
      <h1>{{.Service}}</h1>
      <span class="version">{{.Version}}</span>
    </header>
    <nav aria-label="Browse">
      <a class="active" aria-current="page" href="/srv/prompts/ui/">Prompts</a>
      <a href="/srv/prompts/ui/runs">Runs</a>
    </nav>
    <form method="get" action="/srv/prompts/ui/">
      <label for="q">Search</label>
      <input id="q" name="q" value="{{.Q}}" placeholder="Name or owner email">
      <button type="submit">Filter</button>
    </form>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Owner email</th><th>Updated at</th><th>Created at</th></tr></thead>
        <tbody>
          {{range .Prompts}}
          <tr data-prompt-id="{{.ID}}">
            <td><a href="/srv/prompts/ui/prompts/{{.ID}}">{{.Name}}</a></td>
            <td>{{.OwnerEmail}}</td><td>{{.UpdatedAt}}</td><td>{{.CreatedAt}}</td>
          </tr>
          {{else}}<tr><td colspan="4">No prompts found.</td></tr>{{end}}
        </tbody>
      </table>
    </div>
    <div class="pager">
      <span>Page {{.Page}} of {{.Pages}}</span>
      <span class="pager-links">{{if .PrevURL}}<a rel="prev" href="{{.PrevURL}}">Prev</a>{{end}}{{if .NextURL}}<a rel="next" href="{{.NextURL}}">Next</a>{{end}}</span>
    </div>
  </main>
</body>
</html>
