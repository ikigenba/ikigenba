<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telemetry · ikigenba dashboard</title>
  <link rel="preload" as="font" type="font/woff2" crossorigin href="/static/fonts/space-grotesk.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="/static/fonts/ibm-plex-sans.woff2">
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header class="banner">
    <a href="/" class="wordmark">ikigenba</a>
    <nav class="identity">
      <form method="POST" action="/logout">
        <button type="submit" class="btn btn-danger-ghost btn-sm">Sign out</button>
      </form>
      <a href="/profile" class="avatar" aria-label="Profile — {{.Owner}}" title="{{.Owner}}">{{.OwnerInitial}}</a>
    </nav>
  </header>

  <main class="page">
    <section class="section telemetry" aria-label="Telemetry">
      <div class="section-head">
        <h1>Telemetry</h1>
        <span class="rule"></span>
      </div>
      <div id="telemetry-block" data-fragment="/telemetry/fragment">
        {{template "telemetry_charts" .Charts}}
      </div>
    </section>
  </main>
</body>
</html>
